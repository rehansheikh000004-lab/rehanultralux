<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Calculator</title>

<link rel="stylesheet"
href="apps.css">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

</head>

<body>

<!-- GLOW -->

<div class="bg-glow"></div>

<!-- TOPBAR -->

<div class="topbar">

<div class="logo">
REHAN
</div>

<a href="./dashboard.html"
class="back-btn">

Back

</a>

</div>

<!-- APP -->

<div class="app-container">

<h1 class="app-title">
Calculator
</h1>

<p class="app-description">

Luxury futuristic calculation interface.

</p>

<!-- CALCULATOR -->

<div class="calculator">

<input
type="text"
class="calc-display"
id="display"
readonly>

<div class="calc-buttons">

<button onclick="clearDisplay()">
C
</button>

<button onclick="appendValue('/')">
÷
</button>

<button onclick="appendValue('*')">
×
</button>

<button onclick="deleteLast()">
⌫
</button>

<button onclick="appendValue('7')">
7
</button>

<button onclick="appendValue('8')">
8
</button>

<button onclick="appendValue('9')">
9
</button>

<button onclick="appendValue('-')">
−
</button>

<button onclick="appendValue('4')">
4
</button>

<button onclick="appendValue('5')">
5
</button>

<button onclick="appendValue('6')">
6
</button>

<button onclick="appendValue('+')">
+
</button>

<button onclick="appendValue('1')">
1
</button>

<button onclick="appendValue('2')">
2
</button>

<button onclick="appendValue('3')">
3
</button>

<button onclick="calculate()">
=
</button>

<button onclick="appendValue('0')">
0
</button>

<button onclick="appendValue('.')">
.
</button>

<button onclick="appendValue('%')">
%
</button>

<button onclick="appendValue('(')">
(
</button>

</div>

</div>

</div>

<script>

const display =
document.getElementById("display");

/* APPEND */

function appendValue(value){

display.value += value;

}

/* CLEAR */

function clearDisplay(){

display.value = "";

}

/* DELETE */

function deleteLast(){

display.value =
display.value.slice(0,-1);

}

/* CALCULATE */

function calculate(){

try{

display.value =
eval(display.value);

}

catch{

display.value = "Error";

}

}

</script>

</body>
</html>
